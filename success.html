<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Successful - OHC Trade Room</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Montserrat", sans-serif;
        background: #f8fafc;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #273a68;
      }

      .card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        max-width: 500px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
      }

      h1 {
        color: #2394a0;
        margin-bottom: 10px;
      }

      .ref {
        font-size: 12px;
        color: #666;
        margin-top: 15px;
      }

      .btn {
        margin-top: 25px;
        display: inline-block;
        padding: 12px 20px;
        background: #273a68;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 600;
      }

      .sub {
        font-size: 14px;
        color: #3d4f6e;
        margin-top: 10px;
        line-height: 1.5;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>Payment Successful 🎉</h1>

      <p class="sub">
        Your enrollment is being processed. You will receive access to your
        course shortly via email.
      </p>

      <p id="course" class="sub"></p>

      <p id="ref" class="ref"></p>

      <a href="/" class="btn">Return to Home</a>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);

      const ref = params.get("ref");
      const course = params.get("course");

      if (course) {
        document.getElementById("course").innerText = "Course: " + course;
      }

      if (ref) {
        document.getElementById("ref").innerText = "Reference: " + ref;
      }
    </script>
  </body>
</html>
