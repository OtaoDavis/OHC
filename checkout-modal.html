<!-- Modal for Paystack checkout (shared for all courses and bundles) -->
<div class="modal checkout-modal hidden" id="checkoutModal">
  <div class="modal-dialog">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <div class="modal-content-inner">
      <img
        id="modalCourseImage"
        src=""
        alt="Course Image"
        style="
          width: 100px;
          height: 100px;
          object-fit: cover;
          border-radius: 12px;
          margin-bottom: 20px;
        "
      />
      <h2 id="modalCourseTitle"></h2>
      <div
        style="
          margin-bottom: 10px;
          font-size: 20px;
          font-weight: 700;
          color: var(--teal);
        "
      >
        <span id="modalCoursePrice"></span>
      </div>
      <form id="checkoutForm" onsubmit="return false;">
        <div class="form-group">
          <input
            type="text"
            id="modalFirstName"
            placeholder="First Name"
            required
          />
        </div>
        <div class="form-group">
          <input
            type="text"
            id="modalLastName"
            placeholder="Last Name"
            required
          />
        </div>
        <div class="form-group">
          <input type="email" id="modalEmail" placeholder="Email" required />
        </div>
        <div class="form-group">
          <input
            type="tel"
            id="modalPhone"
            placeholder="Phone Number"
            required
          />
        </div>
        <button
          type="button"
          class="btn btn--teal"
          id="modalPayBtn"
          style="width: 100%; margin-top: 20px"
        >
          Pay & Enroll
        </button>
      </form>
    </div>
  </div>
</div>

<style>
  .checkout-modal {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3000;
    background: rgba(39, 58, 104, 0.25);
    backdrop-filter: blur(4px);
  }
  .checkout-modal.hidden {
    display: none;
  }
  .modal-dialog {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(39, 58, 104, 0.18);
    padding: 40px 32px 32px 32px;
    max-width: 400px;
    width: 100%;
    position: relative;
    text-align: center;
  }
  .close-modal {
    position: absolute;
    top: 18px;
    right: 24px;
    font-size: 28px;
    color: var(--navy);
    cursor: pointer;
    font-weight: 700;
    z-index: 2;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 15px;
    outline: none;
    transition: border 0.2s;
  }
  .form-group input:focus {
    border-color: var(--teal);
  }
</style>
